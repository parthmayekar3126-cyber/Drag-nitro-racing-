<!DOCTYPE html>
<html>
<head>
    <title>3D Asphalt Pro - 200 Levels</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        .hud { background: rgba(0,0,0,0.8); padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.5); }
        
        /* Speedometer Style */
        #speed-circle { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px; border: 5px solid #444; border-top: 5px solid #ff0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.5); }
        #spd-num { font-size: 24px; color: #fff; }

        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; }
        #btn-play { padding: 20px 60px; font-size: 22px; background: #ff0000; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #story-text { max-width: 80%; color: #ccc; line-height: 1.5; margin: 20px 0; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <div class="hud" id="lvl-txt">MISSION: 1/200</div>
    <div class="hud" id="coin-txt">CASH: $0</div>
</div>

<div id="speed-circle">
    <div id="spd-num">0</div>
    <span style="position:absolute; bottom:15px; font-size:10px;">KM/H</span>
</div>

<div id="menu">
    <h1 style="color:#ff0000; font-size:40px;">ASPHALT CLONE</h1>
    <div id="story-text">Level 1: Swagat hai champion! Sheher ki sadkon par apni pehli race jeeto. Nitro ka sahi istemal hi tumhe manzil tak pahuchayega.</div>
    <button id="btn-play">START ENGINE</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Environment
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(5, 10, 7);
    scene.add(sun);

    // Road with 200 Level scaling
    const roadGeo = new THREE.PlaneGeometry(15, 5000); 
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    scene.add(road);

    // Player Car
    const carBody = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.6, 2.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
    carBody.position.y = 0.3;
    scene.add(carBody);

    camera.position.set(0, 3, 7);
    camera.lookAt(carBody.position);

    let level = 1;
    let cash = 0;
    let isRacing = false;
    let tiltX = 0;
    let currentSpeed = 0;

    window.addEventListener('deviceorientation', (e) => { tiltX = e.gamma / 15; });

    document.getElementById('btn-play').onclick = () => {
        document.getElementById('menu').style.display = 'none';
        isRacing = true;
    };

    function animate() {
        requestAnimationFrame(animate);
        if(isRacing) {
            let maxSpeed = 0.8 + (level * 0.2); // Level ke saath speed badhegi
            if(currentSpeed < maxSpeed) currentSpeed += 0.01;

            road.position.z += currentSpeed;
            carBody.position.x += tiltX;
            if(carBody.position.x > 6) carBody.position.x = 6;
            if(carBody.position.x < -6) carBody.position.x = -6;
            camera.position.x = carBody.position.x * 0.5;

            // Speedometer update
            document.getElementById('spd-num').innerText = Math.floor(currentSpeed * 250);

            // Win at Finish line (Flag logic)
            if(road.position.z > 2000 + (level * 500)) {
                isRacing = false;
                cash += (level * 200);
                level++;
                document.getElementById('menu').style.display = 'flex';
                document.getElementById('lvl-txt').innerText = `MISSION: ${level}/200`;
                document.getElementById('coin-txt').innerText = `CASH: $${cash}`;
                currentSpeed = 0;
                road.position.z = 0;
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
      </html>
