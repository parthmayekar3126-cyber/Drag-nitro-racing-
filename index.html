<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nitro Drag Racer Pro</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Arial', sans-serif; color: white; touch-action: none; }
        #game-ui { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
        .stat { font-size: 18px; margin-bottom: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #nitro-container { width: 150px; height: 15px; background: #444; border: 2px solid #fff; }
        #nitro-bar { width: 100%; height: 100%; background: cyan; transition: width 0.1s; }
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 20; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; color: white; font-weight: bold; font-size: 14px; opacity: 0.8; }
        #race-btn { background: #2ecc71; }
        #nitro-btn { background: #e74c3c; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; }
        #play-btn { padding: 15px 40px; font-size: 24px; background: #f1c40f; border: none; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>DRAG NITRO RACING</h1>
    <p>6-Car Challenge</p>
    <button id="play-btn">START GAME</button>
</div>

<div id="game-ui">
    <div class="stat" id="level-display">Level: 1</div>
    <div class="stat" id="speed-display">Speed: 0 km/h</div>
    <div class="stat">Nitro: <div id="nitro-container"><div id="nitro-bar"></div></div></div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
    <button class="btn" id="race-btn">RACE</button>
    <button class="btn" id="nitro-btn">NITRO</button>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let level = 1;
    let racing = false;
    let playerSpeed = 0;
    let nitro = 100;
    let finishLine = canvas.width - 100;

    const colors = ['blue', 'red', 'green', 'yellow', 'orange', 'purple'];
    let cars = [];

    function initCars() {
        cars = [];
        for (let i = 0; i < 6; i++) {
            cars.push({
                x: 50,
                y: 100 + (i * (canvas.height / 8)),
                width: 60,
                height: 30,
                color: colors[i],
                speed: i === 0 ? 0 : (2 + Math.random() * 2 + (level * 0.5)),
                isPlayer: i === 0
            });
        }
    }

    function draw() {
        ctx.fillStyle = '#333';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Road Lines
        ctx.strokeStyle = '#fff';
        ctx.setLineDash([20, 20]);
        for(let i=1; i<7; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * (canvas.height/8) + 85);
            ctx.lineTo(canvas.width, i * (canvas.height/8) + 85);
            ctx.stroke();
        }
        
        // Finish Line
        ctx.setLineDash([]);
        ctx.fillStyle = 'white';
        ctx.fillRect(finishLine, 0, 20, canvas.height);

        cars.forEach(car => {
            ctx.fillStyle = car.color;
            ctx.fillRect(car.x, car.y, car.width, car.height);
            // Wheels
            ctx.fillStyle = 'black';
            ctx.fillRect(car.x + 5, car.y - 5, 15, 5);
            ctx.fillRect(car.x + 40, car.y - 5, 15, 5);
            ctx.fillRect(car.x + 5, car.y + 30, 15, 5);
            ctx.fillRect(car.x + 40, car.y + 30, 15, 5);
        });
    }

    function update() {
        if (!racing) return;

        cars.forEach(car => {
            if (car.isPlayer) {
                car.x += playerSpeed;
            } else {
                car.x += car.speed;
            }

            if (car.x + car.width > finishLine) {
                racing = false;
                if (car.isPlayer) {
                    alert("YOU WON! Level " + level + " Complete!");
                    level++;
                } else {
                    alert("ROBOT WON! Try Again.");
                }
                resetGame();
            }
        });

        document.getElementById('speed-display').innerText = `Speed: ${Math.floor(playerSpeed * 20)} km/h`;
        document.getElementById('nitro-bar').style.width = nitro + "%";
        document.getElementById('level-display').innerText = `Level: ${level}`;
    }

    function resetGame() {
        playerSpeed = 0;
        nitro = 100;
        initCars();
        racing = false;
        document.getElementById('start-screen').style.display = 'flex';
    }

    // Controls
    const raceBtn = document.getElementById('race-btn');
    const nitroBtn = document.getElementById('nitro-btn');

    raceBtn.addEventListener('touchstart', () => { if(racing) playerSpeed += 0.2; });
    nitroBtn.addEventListener('touchstart', () => { 
        if(racing && nitro > 0) { 
            playerSpeed += 0.8; 
            nitro -= 2; 
        } 
    });

    document.getElementById('play-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        racing = true;
    };

    initCars();
    function gameLoop() {
        draw();
        update();
        requestAnimationFrame(gameLoop);
    }
    gameLoop();
</script>
</body>
  </html>
